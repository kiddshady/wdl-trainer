<!doctype html>
<html lang="en" style="background:#0e0f12">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';" />
  <title>wdl-trainer</title>
  <!-- Penumbra CSS (copied into css/ by scripts/copy-css.mjs), then the app shell -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <header class="titlebar">
      <div class="tb-left">
        <div class="brand"><svg class="brand-logo" viewBox="0 0 64 64" width="18" height="18" fill="none" aria-hidden="true"><path d="M8 8 L17 47 L32 19 L47 47 L56 8 M8 8 L32 55 L56 8" stroke="var(--u-accent)" stroke-width="6" stroke-linejoin="miter"/></svg><span class="brand-name">wdl<span class="brand-us">_</span>trainer</span></div>
        <nav class="tb-nav">
          <button data-view="home" class="active" data-i18n="nav.trainer">Trainer</button>
          <button data-view="settings" data-i18n="nav.settings">Settings</button>
        </nav>
      </div>
      <div class="tb-right">
        <span class="tb-code" aria-hidden="true">DS-17</span>
        <div class="window-controls">
          <button id="win-min" aria-label="Minimize"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M5 12h14"/></svg></button>
          <button id="win-max" aria-label="Maximize"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="4.5" y="4.5" width="15" height="15" rx="2.5"/></svg></button>
          <button id="win-close" class="close" aria-label="Close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
      </div>
    </header>
    <main class="content" id="content"><!-- islands mount here --></main>
  </div>
  <!-- decorative DedSec chrome: faint static scanlines + window corner brackets -->
  <div class="app-scanlines" aria-hidden="true"></div>
  <div class="app-corner tl" aria-hidden="true"></div>
  <div class="app-corner tr" aria-hidden="true"></div>
  <div class="app-corner bl" aria-hidden="true"></div>
  <div class="app-corner br" aria-hidden="true"></div>
  <div id="update-toast-host"></div>

  <!-- i18n engine + catalogs — must load before the island bundles + app.js -->
  <script src="js/i18n.js"></script>
  <script src="js/locales/en.js"></script>
  <script src="js/locales/es.js"></script>

  <!-- island bundles (built by build-islands.mjs → window.App<Name>), then the shell -->
  <script src="js/islands/home.bundle.js"></script>
  <script src="js/islands/settings.bundle.js"></script>
  <script src="js/islands/updatetoast.bundle.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
